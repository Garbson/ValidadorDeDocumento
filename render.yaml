services:
  - type: web
    name: validador-documentos
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "18.17.0"
      - key: PYTHONPATH
        value: "/opt/render/project/src"
    plan: free
